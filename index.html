<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>含诺（Arlo）的学习站 🌟</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero { text-align: center; padding: 36px 16px 16px; }
    .hero h1 { font-size: 1.6rem; color: #333; margin-bottom: 6px; }
    .hero p { font-size: 0.95rem; color: #999; }
    .welcome-name { font-size: 1rem; color: #1a73e8; margin-top: 8px; }
    .switch-user { font-size: 0.78rem; color: #aaa; cursor: pointer; text-decoration: underline; margin-left: 6px; }
    .switch-user:hover { color: #1a73e8; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 8px; }
    .history-table th { background: #1a73e8; color: #fff; padding: 7px; text-align: center; white-space: nowrap; }
    .history-table td { padding: 6px 8px; text-align: center; border-bottom: 1px solid #eee; white-space: nowrap; }
    .history-table tr:nth-child(even) td { background: #f8f9fa; }
    .no-data { text-align: center; color: #aaa; padding: 16px; font-size: 0.9rem; }
    /* 移动端：表格改为卡片 */
    @media (max-width: 500px) {
      .history-table, .history-table thead, .history-table tbody, .history-table tr, .history-table th, .history-table td {
        display: block; width: 100%;
      }
      .history-table thead { display: none; }
      .history-table tr {
        background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; padding: 10px 12px;
        border: 1px solid #eee;
      }
      .history-table td {
        text-align: left; padding: 3px 0; border: none; white-space: normal;
      }
      .history-table td::before {
        content: attr(data-label);
        font-weight: 600; color: #888; margin-right: 8px; font-size: 0.8rem;
      }
    }
    .sync-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
    .sync-btns { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .sync-btns .btn { font-size: 0.85rem; padding: 7px 14px; }
    #sync-area { display: none; margin-top: 8px; }
    #sync-area textarea {
      width: 100%; min-height: 60px; border-radius: 8px; border: 1.5px solid #ddd;
      padding: 8px; font-size: 0.8rem; font-family: monospace; resize: vertical; outline: none; word-break: break-all;
    }
    #sync-area textarea:focus { border-color: #1a73e8; }
    #sync-msg { margin-top: 6px; font-size: 0.85rem; font-weight: 600; text-align: center; }
    #sync-msg.ok { color: #1e7e34; }
    #sync-msg.err { color: #c5221f; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="logo">🌟 含诺学习站</span>
    <a href="index.html">🏠 首页</a>
    <a href="units.html">📏 单位换算</a>
    <a href="clock.html">🕐 认识时钟</a>
    <a href="english.html">🔤 英语单词</a>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>含诺（Arlo）的学习站</h1>
      <p>练习单位换算和认识时钟 💪</p>
      <div class="welcome-name" id="welcome-name"></div>
    </div>

    <div class="home-cards">
      <a href="units.html" class="home-card">
        <div class="icon">📏</div>
        <h2>单位换算</h2>
        <p>长度、重量、时间、面积</p>
      </a>
      <a href="clock.html" class="home-card">
        <div class="icon">🕐</div>
        <h2>认识时钟</h2>
        <p>看钟面读时间，拨指针</p>
      </a>
      <a href="english.html" class="home-card">
        <div class="icon">🔤</div>
        <h2>英语单词</h2>
        <p>四年级下册单词练习</p>
      </a>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2 style="font-size:1rem;margin-bottom:10px;">📊 学习记录</h2>
      <div id="history-container"></div>

      <div class="sync-section">
        <p style="color:#999;font-size:0.8rem;margin-bottom:8px;">☁️ 记录自动同步到云端</p>
        <div id="cloud-status" style="font-size:0.8rem;color:#888;margin-bottom:8px;"></div>
        <div class="sync-btns">
          <button class="btn btn-secondary" onclick="doExport()">📤 导出</button>
          <button class="btn btn-secondary" onclick="showImport()">📥 导入</button>
        </div>
        <div id="sync-area">
          <textarea id="sync-data" placeholder="粘贴记录数据..."></textarea>
          <button class="btn btn-primary" onclick="doImport()" style="margin-top:6px;width:100%;font-size:0.85rem;">确认导入</button>
          <div id="sync-msg"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="store.js"></script>
  <script src="cloud.js"></script>
  <script src="auth.js"></script>
  <script>
    onSyncStatus(function(msg, ok) {
      const el = document.getElementById('cloud-status');
      el.textContent = (ok ? '☁️ ' : '⚠️ ') + msg;
      el.style.color = ok ? '#1e7e34' : '#c5221f';
    });

    initAuth(async function(name) {
      document.getElementById('welcome-name').innerHTML =
        '👋 ' + name + '<span class="switch-user" onclick="switchUser()">切换</span>';
      await cloudInit();
      renderHistory();
    });

    function switchUser() { localStorage.removeItem('arlo_username'); location.reload(); }

    function renderHistory() {
      const history = getUserHistory();
      const container = document.getElementById('history-container');
      if (history.length === 0) {
        container.innerHTML = '<div class="no-data">还没有记录，快去练习吧</div>';
        return;
      }
      let html = '<table class="history-table"><thead><tr>' +
        '<th>日期</th><th>📏 换算</th><th>📏 对/错</th><th>🕐 时钟</th><th>🕐 对/错</th><th>🔤 英语</th><th>🔤 对/错</th>' +
        '</tr></thead><tbody>';
      history.forEach(day => {
        const u = day.units || { score: 0, correct: 0, wrong: 0 };
        const c = day.clock || { score: 0, correct: 0, wrong: 0 };
        const e = day.english || { score: 0, correct: 0, wrong: 0 };
        html += `<tr>
          <td data-label="日期">${day.date}</td>
          <td data-label="📏 换算">${u.score}分</td>
          <td data-label="📏 对/错">${u.correct}对 ${u.wrong}错</td>
          <td data-label="🕐 时钟">${c.score}分</td>
          <td data-label="🕐 对/错">${c.correct}对 ${c.wrong}错</td>
          <td data-label="🔤 英语">${e.score}分</td>
          <td data-label="🔤 对/错">${e.correct}对 ${e.wrong}错</td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function doExport() {
      const data = exportUserData();
      if (!data) { alert('没有可导出的记录'); return; }
      document.getElementById('sync-area').style.display = 'block';
      const ta = document.getElementById('sync-data');
      ta.value = data; ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.getElementById('sync-msg').textContent = '已复制到剪贴板';
      document.getElementById('sync-msg').className = 'ok';
    }

    function showImport() {
      document.getElementById('sync-area').style.display = 'block';
      document.getElementById('sync-data').value = '';
      document.getElementById('sync-msg').textContent = '';
    }

    function doImport() {
      const val = document.getElementById('sync-data').value.trim();
      if (!val) { document.getElementById('sync-msg').textContent = '请先粘贴数据'; document.getElementById('sync-msg').className = 'err'; return; }
      const result = importUserData(val);
      document.getElementById('sync-msg').textContent = result.msg;
      document.getElementById('sync-msg').className = result.ok ? 'ok' : 'err';
      if (result.ok) { renderHistory(); syncSave(); }
    }
  </script>
</body>
</html>
